name: Validate Workflow Files

on:
  push:
    paths:
      - '.github/workflows/*.yml'
      - '.github/workflows/recompile_agentic_workflows.yml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint workflow YAML files
        run: |
          set -e
          echo "Linting all workflow YAML files in .github/workflows/ ..."
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" .github/workflows/*.yml
          echo "All workflow YAML files passed linting."
