name: Recompile Agentic Workflows

on:
  push:
    branches-ignore:
      - main
    paths:
      - '.github/workflows/recompile_agentic_workflows.yml'
      - '.github/workflows/*.md'
      - '.github/workflows/*.lock.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recompile:
    # Prevent an infinite loop: skip runs triggered by our own push.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          token: ${{ github.token }}

      - name: Install gh aw extension
        run: gh extension install github/gh-aw --pin v0.71.1
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Compile agentic workflows
        run: gh aw compile
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit and push recompiled lock files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/*.lock.yml
          if git diff --staged --quiet; then
            echo "Lock files are already up to date — nothing to commit."
            exit 0
          fi
          git commit -m "chore: recompile agentic workflows"
          git push origin HEAD:${{ github.ref }}
