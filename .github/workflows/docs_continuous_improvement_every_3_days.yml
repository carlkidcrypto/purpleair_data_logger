name: Docs Continuous Improvement Every 3 Days

on:
  schedule:
    - cron: "0 9 */3 * *"
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/docs_continuous_improvement_every_3_days.yml

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check for existing automation PR
        id: check_pr
        run: |
          count=$(gh pr list \
            --state open \
            --head automation/docs-continuous-improvement \
            --label documentation \
            --label automated-pr \
            --json number \
            --jq 'length')
          echo "count=$count" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Copilot Agent
        if: steps.check_pr.outputs.count == '0'
        uses: github/copilot-coding-agent-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt_file: .github/workflows/docs_continuous_improvement_every_3_days.md
          model: auto
