name: Auto Update Release Notes

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      backfill_all:
        description: 'Backfill release notes for ALL existing releases'
        type: boolean
        required: false
        default: false
  push:
    paths:
      - .github/workflows/auto_release_notes.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Copilot Agent
        uses: github/copilot-coding-agent-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt_file: .github/workflows/auto_release_notes.md
          model: auto
        env:
          BACKFILL_ALL: ${{ inputs.backfill_all || 'false' }}
